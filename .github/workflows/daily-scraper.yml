name: Daily Scraper Update

on:
  schedule:
    # 6:00 PM Taiwan time (UTC+8) = 10:00 AM UTC
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual triggers for testing

# Prevent overlapping runs (a slow scrape shouldn't race the next schedule).
concurrency:
  group: daily-scraper
  cancel-in-progress: false

permissions:
  contents: write   # push the refreshed data back to the repo
  pages: write      # deploy the dashboards to GitHub Pages
  id-token: write   # required by actions/deploy-pages
  issues: write     # open a tracking issue if the run fails

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run tests (gate before scraping)
      run: python -m pytest -q

    - name: Run Case Definition Scraper
      run: python scraper.py

    - name: Build Case Dashboard
      run: python build_dashboard.py

    - name: Run Disease Manuals Scraper
      run: python manual_scraper.py

    - name: Build Manuals Dashboard
      run: python build_manuals_dashboard.py

    # Only the structured data + status report are version-controlled; the
    # large generated HTML is published to Pages (below) instead of committed,
    # which keeps the git history from ballooning on every run.
    - name: Commit and Push Data Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -A
        if ! git diff-index --quiet HEAD; then
          git commit -m "🤖 Auto-update disease data [skip ci]"
          git push
        else
          echo "No data changes to commit."
        fi

    - name: Assemble Pages site
      run: |
        mkdir -p _site
        cp index.html manuals.html .nojekyll _site/

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Open an issue on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const title = '🚨 Daily scraper run failed';
          const existing = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'ci-failure',
          });
          const body = `The scheduled scraper run failed.\n\n` +
            `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          if (existing.data.length > 0) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.data[0].number,
              body,
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure'],
            });
          }

  deploy:
    needs: scrape-and-update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
